<header class="topbar">
  <h1>Galería de Imagenes</h1>

  <div class="menu-container" tabindex="0">
    <button class="menu-trigger" aria-haspopup="true" aria-label="Menú de opciones" type="button" (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="menu-dropdown" *ngIf="menuAbierto">
      <button class="menu-item" type="button" (click)="openForm()">
        Agregar imagen
      </button>
    </div>
  </div>
</header>

<div class="form-overlay" *ngIf="mostrarForm" (click)="mostrarForm = false">
  <div class="formulario modal" (click)="$event.stopPropagation()">
    <h3>Agregar nueva imagen</h3>
    <input [(ngModel)]="nuevoDibujo.titulo" placeholder="Título">
    <input [(ngModel)]="nuevoDibujo.descripcion" placeholder="Descripción">
    <input [(ngModel)]="nuevoDibujo.imagenUrl" placeholder="URL de la imagen">
    <div class="form-actions">
      <button type="button" (click)="agregar()" [disabled]="guardando">
        {{ guardando ? 'Guardando...' : 'Agregar' }}
      </button>
      <button type="button" class="secondary" (click)="mostrarForm = false">Cancelar</button>
    </div>
  </div>
</div>

<!-- CARRUSEL -->
<div class="carrusel-trip" *ngIf="dibujos.length > 0">
  <ul class="carousel" #carouselRef>
    <li
      *ngFor="let dibujo of dibujos; let i = index"
      class="day-card"
      [attr.data-num]="'#' + (i + 1)"
    >
      <img [src]="dibujo.imagenUrl" [alt]="dibujo.titulo" (click)="abrirLightbox(dibujo)">
      <div class="meta">
        <h2>{{ dibujo.titulo }}</h2>
        <p class="desc">{{ dibujo.descripcion }}</p>
      </div>
    </li>
  </ul>
</div>

<div class="seccion-titulo">Todas las imágenes</div>

<div class="galeria">
  <div *ngFor="let dibujo of dibujos" class="tarjeta">
    <img [src]="dibujo.imagenUrl" [alt]="dibujo.titulo" (click)="abrirLightbox(dibujo)">
    <h3>{{ dibujo.titulo }}</h3>
    <p>{{ dibujo.descripcion }}</p>
    <button (click)="eliminar(dibujo.id!)">Eliminar</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox-overlay" *ngIf="lightboxAbierto" (click)="cerrarLightbox()">
  <button class="lightbox-cerrar" (click)="cerrarLightbox()">✕</button>
  <img [src]="lightboxImagen" [alt]="lightboxTitulo" (click)="$event.stopPropagation()">
  <div class="lightbox-titulo">{{ lightboxTitulo }}</div>
</div>

<div class="toast" [class.visible]="toastVisible">{{ toastMensaje }}</div>
