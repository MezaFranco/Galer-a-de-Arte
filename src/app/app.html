<h1>Galería de Dibujos</h1>

<!-- Formulario para AGREGAR -->
<div class="formulario">
  <h3>Agregar nuevo dibujo</h3>
  <input [(ngModel)]="nuevoDibujo.titulo" placeholder="Título">
  <input [(ngModel)]="nuevoDibujo.descripcion" placeholder="Descripción">
  <input [(ngModel)]="nuevoDibujo.imagenUrl" placeholder="URL de la imagen">
  <button (click)="agregar()">➕ Agregar</button>
</div>

<!-- Galería -->
<div class="galeria">
  <div *ngFor="let dibujo of dibujos" class="tarjeta">
    <img [src]="dibujo.imagenUrl" [alt]="dibujo.titulo">
    <h3>{{ dibujo.titulo }}</h3>
    <p>{{ dibujo.descripcion }}</p>
    <button (click)="eliminar(dibujo.id!)">🗑️ Eliminar</button>
  </div>
</div>

<!-- HUD overlay -->
<div class="hud" aria-hidden="true">
  <div class="hud-top">
    <div class="hud-left">
      <ng-container *ngIf="dibujos?.length; else noMap">
        <div class="minimap" [style.background-image]="'url(' + dibujos[0].imagenUrl + ')'" title="Miniatura"></div>
      </ng-container>
      <ng-template #noMap>
        <div class="minimap empty">MAP</div>
      </ng-template>
    </div>
    <div class="hud-right">
      <div class="status">
        <div class="badge">Dibujos</div>
        <div class="counter">{{ dibujos?.length || 0 }}</div>
      </div>
    </div>
  </div>

  <div class="crosshair"></div>
  <div class="scanline"></div>
</div>
